<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-section { background: #212529; color: white; padding: 2rem; border-radius: 15px 15px 0 0; }
        .btn-analyze { background-color: #0d6efd; border: none; padding: 12px 30px; font-weight: 600; }
        #system_response { font-weight: 500; color: #495057; background: #e9ecef; border-radius: 8px; min-height: 50px; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card main-card">
                    <div class="header-section text-center">
                        <h1 class="display-5 fw-bold">NLP Engine</h1>
                        <p class="lead mb-0">Real-time Emotion Detection</p>
                    </div>
                    
                    <div class="card-body p-5">
                        <div class="mb-4">
                            <label for="textToAnalyze" class="form-label fw-bold text-uppercase small text-muted">Input Text</label>
                            <textarea class="form-control form-control-lg" id="textToAnalyze" rows="4" placeholder="Type your text here..."></textarea>
                        </div>

                        <div class="d-grid gap-2 mb-5">
                            <button onclick="RunSentimentAnalysis()" class="btn btn-primary btn-analyze">
                                Analyze Sentiment
                            </button>
                        </div>

                        <hr class="my-4">

                        <div class="result-area">
                            <h5 class="fw-bold mb-3">Analysis Result</h5>
                            <div id="system_response" class="p-4 border border-dashed">
                                Waiting for input...
                            </div>
                        </div>
                    </div>
                </div>
                <p class="text-center mt-4 text-muted small">Powered by IBM Watson NLP</p>
            </div>
        </div>
    </div>

    <script src="./static/mywebscript.js"></script>
</body>
</html>
